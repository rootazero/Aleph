# Example: Full Template Mode
# Completely custom protocol implementation
#
# This example demonstrates a provider with a custom API that doesn't
# follow OpenAI conventions at all. It shows all available features
# of the protocol adapter system.
#
# Use this when:
# - The provider's API is completely different from OpenAI
# - You need full control over request/response structure
# - The provider uses custom authentication, endpoints, or data formats

name: exotic-ai
base_url: https://api.exotic.ai

custom:
  # Authentication configuration
  auth:
    type: header
    header: X-API-Token
    # Template variables available: config.api_key, config.*, env.*
    value_template: "{{config.api_key}}"
    # Alternative: use environment variable
    # value_template: "{{env.EXOTIC_API_KEY}}"

  # API endpoint paths (relative to base_url)
  endpoints:
    chat: "/v2/completions"
    stream: "/v2/completions/stream"
    # Optional: models endpoint for model listing
    # models: "/v2/models"  # Not yet implemented

  # Request structure mapping
  # This defines how to transform Aleph's standard request format
  # into the provider's custom format
  request_template:
    # Model identifier
    model_name: "{{config.model}}"

    # Input messages (supports multiple message formats)
    # Option 1: Simple text input
    input_text: "{{input}}"

    # Option 2: Structured messages (commented out)
    # messages: "{{messages}}"

    # System prompt
    system_instruction: "{{system_prompt}}"

    # Parameters
    parameters:
      temperature: "{{config.temperature}}"
      max_tokens: "{{config.max_tokens}}"
      top_p: "{{config.top_p}}"
      # Custom provider-specific parameters
      creativity_level: "{{config.creativity_level | default: 'medium'}}"
      safety_mode: "{{config.safety_mode | default: 'strict'}}"

    # User metadata (optional)
    metadata:
      user_id: "{{config.user_id}}"
      session_id: "{{session_id}}"

  # Response structure mapping
  # JSONPath expressions to extract data from provider's response
  response_mapping:
    # Main content path
    content: "$.output.generated_text"

    # Alternative content paths (fallbacks)
    # content_alternatives:  # Not yet implemented
    #   - "$.result.text"
    #   - "$.data.completion"

    # Error message path
    error: "$.error.message"

    # Optional: extract additional metadata - Not yet implemented
    # model: "$.output.model_used"
    # usage:
    #   prompt_tokens: "$.usage.input_tokens"
    #   completion_tokens: "$.usage.output_tokens"
    #   total_tokens: "$.usage.total_tokens"

    # Finish reason mapping - Not yet implemented
    # finish_reason:
    #   path: "$.output.stop_reason"
    #   # Map provider's finish reasons to standard ones
    #   mapping:
    #     completed: stop
    #     length_limit: length
    #     content_filtered: content_filter
    #     timeout: stop

  # Streaming configuration
  stream_config:
    # Stream format: sse (Server-Sent Events) or ndjson (Newline-Delimited JSON)
    format: sse

    # SSE event prefix
    event_prefix: "data: "

    # Marker that indicates end of stream
    done_marker: "[DONE]"

    # JSONPath to extract content from each chunk
    content_path: "$.chunk.text"

    # Optional: delta vs. full content mode - Not yet implemented
    # delta: each chunk contains only new content
    # full: each chunk contains full content so far
    # content_mode: delta

    # Optional: finish reason in final chunk - Not yet implemented
    # finish_reason_path: "$.chunk.finish_reason"

