[plugin]
id = "voice-call"
name = "Voice Call"
version = "0.1.0"
description = "Voice calling framework with WebRTC/SIP stubs and call state management"
kind = "nodejs"
entry = "src/index.js"

[permissions]
network = true
shell = true

[config_schema.sip_server]
type = "string"
description = "SIP server address (e.g. sip.example.com)"

[config_schema.stun_servers]
type = "array"
description = "STUN/TURN server URLs for WebRTC ICE"
items = { type = "string" }

[config_schema.default_codec]
type = "string"
description = "Default audio codec"
default = "opus"

# ---------------------------------------------------------------------------
# Tools
# ---------------------------------------------------------------------------

[[tools]]
name = "call_initiate"
description = "Start an outbound voice call to a phone number or SIP URI"
handler = "callInitiate"

[tools.parameters]
type = "object"
required = ["target"]

[tools.parameters.properties.target]
type = "string"
description = "Phone number or SIP URI to call"

[tools.parameters.properties.caller_id]
type = "string"
description = "Caller ID to present"

[tools.parameters.properties.record]
type = "boolean"
description = "Whether to record the call"
default = false

[[tools]]
name = "call_answer"
description = "Answer an incoming voice call"
handler = "callAnswer"

[tools.parameters]
type = "object"
required = ["call_id"]

[tools.parameters.properties.call_id]
type = "string"
description = "ID of the incoming call to answer"

[tools.parameters.properties.record]
type = "boolean"
description = "Whether to record the call"
default = false

[[tools]]
name = "call_hangup"
description = "End an active or ringing call"
handler = "callHangup"

[tools.parameters]
type = "object"
required = ["call_id"]

[tools.parameters.properties.call_id]
type = "string"
description = "ID of the call to hang up"

[[tools]]
name = "call_status"
description = "Get status of a specific call or all active calls"
handler = "callStatus"

[tools.parameters]
type = "object"

[tools.parameters.properties.call_id]
type = "string"
description = "ID of a specific call (omit to get all calls)"

[[tools]]
name = "call_transcribe"
description = "Get live or completed transcription for a call"
handler = "callTranscribe"

[tools.parameters]
type = "object"
required = ["call_id"]

[tools.parameters.properties.call_id]
type = "string"
description = "ID of the call to transcribe"

[tools.parameters.properties.language]
type = "string"
description = "Language code for transcription (e.g. en, zh) or auto-detect"
default = "auto"

# ---------------------------------------------------------------------------
# Services
# ---------------------------------------------------------------------------

[[services]]
name = "call-manager"
description = "Manages call sessions and audio streams"
start_handler = "startCallManager"
stop_handler = "stopCallManager"
