name: Aleph

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift.git
    from: "7.0.0"

options:
  bundleIdPrefix: Rootazero
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: false
  # Known regions for localization (XcodeGen will search for .lproj folders)
  knownRegions:
    - en
    - zh-Hans

settings:
  base:
    SWIFT_VERSION: 6.0
    MARKETING_VERSION: 0.1.0
    CURRENT_PROJECT_VERSION: 1
    MACOSX_DEPLOYMENT_TARGET: 15.0
    SDKROOT: macosx
    SUPPORTED_PLATFORMS: macosx
    ENABLE_PREVIEWS: YES
    # Development team for stable code signing (avoids re-authorization on each build)
    DEVELOPMENT_TEAM: DVMQ798AGH
    SWIFT_APPROACHABLE_CONCURRENCY: YES
    SWIFT_EMIT_LOC_STRINGS: YES
    SWIFT_UPCOMING_FEATURE_MEMBER_IMPORT_VISIBILITY: YES
    STRING_CATALOG_GENERATE_SYMBOLS: YES
    # Swift 6 concurrency checking: minimal (for UniFFI compatibility), targeted, complete
    # Note: Using minimal to avoid errors in UniFFI-generated code (aleph.swift)
    # which has global mutable state (vtable, handleMap, initializationResult)
    SWIFT_STRICT_CONCURRENCY: minimal
    # Limit to arm64 only to match Rust library architecture
    ARCHS: arm64
    ONLY_ACTIVE_ARCH: NO
  configs:
    Debug:
      # Enable DEBUG flag for #if DEBUG conditional compilation
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
    Release:
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: ""

targets:
  Aleph:
    type: application
    platform: macOS
    sources:
      - path: Aleph/Sources
        name: Sources
        type: group
      - path: Aleph/Assets.xcassets
        type: file
      - path: Aleph/Resources
        name: Resources
        type: group
        excludes:
          - "AppIcon/**"
          - "skills/**"
      - path: Aleph/Resources/skills
        name: skills
        type: folder
        buildPhase: resources
    info:
      path: Aleph/Info.plist
      properties:
        CFBundleDevelopmentRegion: en
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleInfoDictionaryVersion: "6.0"
        CFBundleName: $(PRODUCT_NAME)
        CFBundlePackageType: $(PRODUCT_BUNDLE_PACKAGE_TYPE)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleLocalizations:
          - en
          - zh-Hans
        LSMinimumSystemVersion: "15.0"
        LSUIElement: true
        NSAppleEventsUsageDescription: "Aleph needs to simulate keyboard input to paste AI responses into your applications and monitor global hotkeys for seamless AI integration."
        NSHumanReadableCopyright: "Copyright © 2025 Aleph. All rights reserved."
        NSPrincipalClass: NSApplication
    entitlements:
      path: Aleph/Aleph.entitlements
      properties:
        com.apple.security.automation.apple-events: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: Rootazero.Aleph
        PRODUCT_NAME: $(TARGET_NAME)
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Aleph/Info.plist
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
        OTHER_LDFLAGS:
          - -Xlinker
          - -no_application_extension
        LIBRARY_SEARCH_PATHS:
          - $(inherited)
          - $(PROJECT_DIR)/Aleph/Frameworks
        FRAMEWORK_SEARCH_PATHS:
          - $(inherited)
          - $(PROJECT_DIR)/Aleph/Frameworks
        HEADER_SEARCH_PATHS:
          - $(inherited)
          - $(PROJECT_DIR)/Aleph/Sources/Generated
          - $(PROJECT_DIR)/Aleph/Sources/LiquidGlass/Metal/Shaders
        SWIFT_INCLUDE_PATHS:
          - $(inherited)
          - $(PROJECT_DIR)/Aleph/Sources/Generated
        # Enable module import for UniFFI FFI
        # Import bridging header for UniFFI (provides access to alephFFI.h)
        SWIFT_OBJC_BRIDGING_HEADER: $(PROJECT_DIR)/Aleph/Sources/AlephBridgingHeader.h
        CLANG_ENABLE_MODULES: YES
    dependencies:
      - framework: Aleph/Frameworks/libalephcore.dylib
        embed: true
        link: true
      - package: GRDB
    postCompileScripts:
      - name: "SwiftLint"
        script: |
          # Run SwiftLint if installed
          if command -v swiftlint &> /dev/null; then
              swiftlint lint --config "${PROJECT_DIR}/.swiftlint.yml" --quiet
          elif [ -f "/opt/homebrew/bin/swiftlint" ]; then
              /opt/homebrew/bin/swiftlint lint --config "${PROJECT_DIR}/.swiftlint.yml" --quiet
          elif [ -f "/usr/local/bin/swiftlint" ]; then
              /usr/local/bin/swiftlint lint --config "${PROJECT_DIR}/.swiftlint.yml" --quiet
          else
              echo "warning: SwiftLint not installed. Install with: brew install swiftlint"
          fi
        basedOnDependencyAnalysis: false
    preBuildScripts:
      - name: "Build Rust Core"
        script: |
          # Build Rust core library if needed
          CARGO_PATH="${HOME}/.cargo/bin/cargo"
          CORE_DIR="${PROJECT_DIR}/../../core"
          # Workspace target directory is at root level
          WORKSPACE_TARGET="${PROJECT_DIR}/../../target"

          if [ "${CONFIGURATION}" = "Debug" ]; then
              cd "${CORE_DIR}"
              "${CARGO_PATH}" build
              # Copy debug library from workspace target
              cp "${WORKSPACE_TARGET}/debug/libalephcore.dylib" "${PROJECT_DIR}/Aleph/Frameworks/"
              # Fix install_name to use @rpath for portability across machines
              install_name_tool -id "@rpath/libalephcore.dylib" "${PROJECT_DIR}/Aleph/Frameworks/libalephcore.dylib"
          else
              cd "${CORE_DIR}"
              "${CARGO_PATH}" build --release
              # Copy release library from workspace target
              cp "${WORKSPACE_TARGET}/release/libalephcore.dylib" "${PROJECT_DIR}/Aleph/Frameworks/"
              # Fix install_name to use @rpath for portability across machines
              install_name_tool -id "@rpath/libalephcore.dylib" "${PROJECT_DIR}/Aleph/Frameworks/libalephcore.dylib"
          fi
        basedOnDependencyAnalysis: false
      - name: "Generate UniFFI Bindings"
        script: |
          # Generate Swift bindings from Rust using Cargo uniffi-bindgen
          CARGO_PATH="${HOME}/.cargo/bin/cargo"
          CORE_DIR="${PROJECT_DIR}/../../core"
          # Workspace target directory is at root level
          WORKSPACE_TARGET="${PROJECT_DIR}/../../target"
          cd "${CORE_DIR}"

          # Determine which library to use based on configuration
          if [ "${CONFIGURATION}" = "Debug" ]; then
              LIBRARY_PATH="${WORKSPACE_TARGET}/debug/libalephcore.dylib"
          else
              LIBRARY_PATH="${WORKSPACE_TARGET}/release/libalephcore.dylib"
          fi

          # Use Cargo to run uniffi-bindgen (more reliable than Python version)
          "${CARGO_PATH}" run --bin uniffi-bindgen -- generate \
            --library "${LIBRARY_PATH}" \
            --language swift \
            --out-dir "${PROJECT_DIR}/Aleph/Sources/Generated/"

          # Patch generated Swift for Swift 6 concurrency compatibility
          # Add nonisolated(unsafe) to global mutable state variables (idempotent)
          GENERATED_FILE="${PROJECT_DIR}/Aleph/Sources/Generated/aleph.swift"
          if [ -f "${GENERATED_FILE}" ]; then
              # Only patch if not already patched (check for marker)
              if ! grep -q "nonisolated(unsafe) static var vtable" "${GENERATED_FILE}"; then
                  sed -i '' 's/    static var vtable/    nonisolated(unsafe) static var vtable/g' "${GENERATED_FILE}"
                  sed -i '' 's/    fileprivate static var handleMap/    nonisolated(unsafe) fileprivate static var handleMap/g' "${GENERATED_FILE}"
                  sed -i '' 's/^private var initializationResult/nonisolated(unsafe) private var initializationResult/g' "${GENERATED_FILE}"
                  echo "Swift 6 concurrency patches applied to aleph.swift"
              else
                  echo "aleph.swift already patched, skipping"
              fi

              # Remove redundant Sendable conformances to fix Swift 6 warnings
              # These are auto-synthesized for structs with all Sendable members
              perl -i -pe '
                BEGIN { $block = 0; }
                if (/^#if compiler\(>=6\)$/) {
                  $block = 1;
                  $line1 = $_;
                  $_ = "";
                  next;
                }
                if ($block == 1 && /^extension \w+: Sendable \{\}$/) {
                  $line2 = $_;
                  $_ = "";
                  $block = 2;
                  next;
                }
                if ($block == 2 && /^#endif$/) {
                  $_ = "";
                  $block = 0;
                  next;
                }
                if ($block > 0) {
                  # Found non-matching line, restore buffered lines
                  $_ = $line1 . $line2 . $_;
                  $block = 0;
                }
              ' "${GENERATED_FILE}"
              echo "Redundant Sendable conformances removed from aleph.swift"
          fi

          echo "UniFFI bindings generated successfully"
        basedOnDependencyAnalysis: false

  AlephTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: AlephTests
        name: AlephTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: Rootazero.AlephTests
        PRODUCT_NAME: $(TARGET_NAME)
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/Aleph.app/Contents/MacOS/Aleph
        SWIFT_EMIT_LOC_STRINGS: NO
    dependencies:
      - target: Aleph

  AlephUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: AlephUITests
        name: AlephUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: Rootazero.AlephUITests
        PRODUCT_NAME: $(TARGET_NAME)
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: Aether
        SWIFT_EMIT_LOC_STRINGS: NO
    dependencies:
      - target: Aleph

schemes:
  Aleph:
    build:
      targets:
        Aleph: all
        AlephTests: [test]
        AlephUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - AlephTests
        - AlephUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
