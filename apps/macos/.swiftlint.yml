# SwiftLint Configuration for Aleph macOS
# https://github.com/realm/SwiftLint

# ============================================================================
# Paths
# ============================================================================

included:
  - Aleph/Sources

excluded:
  - Aleph/Sources/Generated  # UniFFI generated code
  - AlephTests
  - AlephUITests
  - .build
  - Pods
  - Carthage

# ============================================================================
# Rules Configuration
# ============================================================================

# Disabled rules that conflict with project style or produce noise
disabled_rules:
  - todo                          # Allow TODO/FIXME comments
  - trailing_comma                # Project doesn't enforce trailing commas
  - opening_brace                 # Allow flexibility in brace placement
  - identifier_name               # Some short names are acceptable (e.g., id, md)
  - large_tuple                   # Allow tuples for grouped returns
  - nesting                       # Allow nested types for organization
  - cyclomatic_complexity         # Complex coordinators are acceptable
  - function_body_length          # Some functions are necessarily long
  - type_body_length              # ViewModels can be large
  - file_length                   # Some files are necessarily long
  - pattern_matching_keywords     # Allow let/var inside tuples for clarity
  - implicit_return               # Explicit return is often clearer
  - implicit_optional_initialization  # Allow explicit = nil for clarity
  - multiline_arguments           # Project style allows flexible argument placement
  - multiline_function_chains     # Project style allows flexible chaining
  - multiple_closures_with_trailing_closure  # SwiftUI commonly uses this pattern
  - redundant_string_enum_value   # Explicit values can aid clarity
  - for_where                     # Allow if inside for for readability
  - discouraged_optional_collection  # Sometimes needed for API compatibility
  - orphaned_doc_comment          # Conflicts with swiftlint:disable annotations
  - function_parameter_count      # Some complex APIs require many parameters
  - enum_case_associated_values_count  # Complex states need many associated values

# Opt-in rules that improve code quality
opt_in_rules:
  # Style
  - array_init
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - contains_over_range_nil_comparison
  - discouraged_none_name
  - discouraged_object_literal
  - empty_collection_literal
  - empty_count
  - empty_string
  - enum_case_associated_values_count
  - explicit_init
  - extension_access_modifier
  - fallthrough
  - fatal_error_message
  - file_name_no_space
  - first_where
  - flatmap_over_map_reduce
  - identical_operands
  - joined_default_parameter
  - last_where
  - legacy_multiple
  - literal_expression_end_indentation
  - lower_acl_than_parent
  - modifier_order
  - multiline_literal_brackets
  - multiline_parameters
  - operator_usage_whitespace
  - optional_enum_case_matching
  - overridden_super_call
  - override_in_extension
  - prefer_self_type_over_type_of_self
  - prefer_zero_over_explicit_init
  - private_action
  - private_outlet
  - prohibited_super_call
  - reduce_into
  - redundant_nil_coalescing
  - redundant_type_annotation
  - static_operator
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - unowned_variable_capture
  - yoda_condition

  # Safety
  - force_unwrapping              # Warn on force unwrapping
  - implicitly_unwrapped_optional # Warn on implicitly unwrapped optionals
  - discouraged_optional_boolean

# ============================================================================
# Rule Configurations
# ============================================================================

# Line length - allow longer lines for URLs, comments, etc.
line_length:
  warning: 150
  error: 200
  ignores_urls: true
  ignores_comments: true
  ignores_interpolated_strings: true
  ignores_function_declarations: true

# Type name length
type_name:
  min_length: 2
  max_length:
    warning: 50
    error: 60
  allowed_symbols: ["_"]
  validates_start_with_lowercase: false

# Force unwrapping - warning only (some cases are safe)
force_unwrapping:
  severity: warning

# Implicitly unwrapped optionals - warning only
implicitly_unwrapped_optional:
  severity: warning
  mode: all_except_iboutlets

# Trailing whitespace
trailing_whitespace:
  ignores_empty_lines: true
  ignores_comments: true

# Vertical whitespace
vertical_whitespace:
  max_empty_lines: 2

# Colon spacing
colon:
  apply_to_dictionaries: true

# Comma spacing
comma:
  severity: warning

# Control statement
control_statement:
  severity: warning

# Redundant discardable let
redundant_discardable_let:
  severity: warning

# Void return
void_return:
  severity: warning

# Return arrow whitespace
return_arrow_whitespace:
  severity: warning

# Statement position
statement_position:
  statement_mode: default
  severity: warning

# Multiline parameters
multiline_parameters:
  allows_single_line: true

# Private over fileprivate
private_over_fileprivate:
  validate_extensions: true

# Protocol property accessors order
protocol_property_accessors_order:
  severity: warning


# Self in property initialization
self_in_property_initialization:
  severity: warning

# Shorthand operator
shorthand_operator:
  severity: warning

# Syntactic sugar
syntactic_sugar:
  severity: warning

# Unused closure parameter
unused_closure_parameter:
  severity: warning

# Unused control flow label
unused_control_flow_label:
  severity: warning

# Unused enumerated
unused_enumerated:
  severity: warning

# Unused optional binding
unused_optional_binding:
  severity: warning
  ignore_optional_try: true

# Custom rules for project-specific patterns
custom_rules:
  # Ensure MARK comments have proper formatting
  mark_format:
    name: "MARK Format"
    regex: "//\\s*MARK\\s*[^:-]"
    message: "MARK comments should use format: // MARK: - Description"
    severity: warning

  # Discourage force try
  no_force_try:
    name: "No Force Try"
    regex: "try!"
    message: "Avoid force try. Use do-catch or try? instead"
    severity: warning

# ============================================================================
# Reporter
# ============================================================================

reporter: "xcode"
