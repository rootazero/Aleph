name: Aleph

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift.git
    from: "7.0.0"

options:
  bundleIdPrefix: Rootazero
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: false
  # Known regions for localization (XcodeGen will search for .lproj folders)
  knownRegions:
    - en
    - zh-Hans

settings:
  base:
    SWIFT_VERSION: 6.0
    MARKETING_VERSION: 0.1.0
    CURRENT_PROJECT_VERSION: 1
    MACOSX_DEPLOYMENT_TARGET: 15.0
    SDKROOT: macosx
    SUPPORTED_PLATFORMS: macosx
    ENABLE_PREVIEWS: YES
    # Development team for stable code signing (avoids re-authorization on each build)
    # DEVELOPMENT_TEAM: DVMQ798AGH  # Temporarily disabled for local testing
    SWIFT_APPROACHABLE_CONCURRENCY: YES
    SWIFT_EMIT_LOC_STRINGS: YES
    SWIFT_UPCOMING_FEATURE_MEMBER_IMPORT_VISIBILITY: YES
    STRING_CATALOG_GENERATE_SYMBOLS: YES
    # Swift 6 concurrency checking: minimal (for UniFFI compatibility), targeted, complete
    # Note: Using minimal to avoid errors in UniFFI-generated code (aleph.swift)
    # which has global mutable state (vtable, handleMap, initializationResult)
    SWIFT_STRICT_CONCURRENCY: minimal
    # Limit to arm64 only to match Rust library architecture
    ARCHS: arm64
    ONLY_ACTIVE_ARCH: NO
  configs:
    Debug:
      # Enable DEBUG flag for #if DEBUG conditional compilation
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
    Release:
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: ""

targets:
  Aleph:
    type: application
    platform: macOS
    sources:
      - path: Aleph/Sources
        name: Sources
        type: group
      - path: Aleph/Assets.xcassets
        type: file
      - path: Aleph/Resources
        name: Resources
        type: group
        excludes:
          - "AppIcon/**"
          - "skills/**"
      - path: Aleph/Resources/skills
        name: skills
        type: folder
        buildPhase: resources
    info:
      path: Aleph/Info.plist
      properties:
        CFBundleDevelopmentRegion: en
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleInfoDictionaryVersion: "6.0"
        CFBundleName: $(PRODUCT_NAME)
        CFBundlePackageType: $(PRODUCT_BUNDLE_PACKAGE_TYPE)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleLocalizations:
          - en
          - zh-Hans
        LSMinimumSystemVersion: "15.0"
        LSUIElement: true
        NSAppleEventsUsageDescription: "Aleph needs to simulate keyboard input to paste AI responses into your applications and monitor global hotkeys for seamless AI integration."
        NSAccessibilityUsageDescription: "Aleph needs accessibility access to read UI elements and interact with other applications on your behalf."
        NSScreenCaptureUsageDescription: "Aleph needs screen recording access to capture what's on your screen."
        NSHumanReadableCopyright: "Copyright © 2025 Aleph. All rights reserved."
        NSPrincipalClass: NSApplication
    entitlements:
      path: Aleph/Aleph.entitlements
      properties:
        com.apple.security.automation.apple-events: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: Rootazero.Aleph
        PRODUCT_NAME: $(TARGET_NAME)
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"  # Use ad-hoc signing for local testing
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Aleph/Info.plist
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
        OTHER_LDFLAGS:
          - -Xlinker
          - -no_application_extension
        LIBRARY_SEARCH_PATHS:
          - $(inherited)
          - $(PROJECT_DIR)/Aleph/Frameworks
        FRAMEWORK_SEARCH_PATHS:
          - $(inherited)
          - $(PROJECT_DIR)/Aleph/Frameworks
        HEADER_SEARCH_PATHS:
          - $(inherited)
          - $(PROJECT_DIR)/Aleph/Sources/Generated
          - $(PROJECT_DIR)/Aleph/Sources/LiquidGlass/Metal/Shaders
        SWIFT_INCLUDE_PATHS:
          - $(inherited)
          - $(PROJECT_DIR)/Aleph/Sources/Generated
        # Enable module import for UniFFI FFI
        # Import bridging header for UniFFI (provides access to alephFFI.h)
        SWIFT_OBJC_BRIDGING_HEADER: $(PROJECT_DIR)/Aleph/Sources/AlephBridgingHeader.h
        CLANG_ENABLE_MODULES: YES
    dependencies:
      - framework: Aleph/Frameworks/libalephcore.dylib
        embed: true
        link: true
      - package: GRDB
    postCompileScripts:
      - name: "SwiftLint"
        script: |
          # Run SwiftLint if installed
          if command -v swiftlint &> /dev/null; then
              swiftlint lint --config "${PROJECT_DIR}/.swiftlint.yml" --quiet
          elif [ -f "/opt/homebrew/bin/swiftlint" ]; then
              /opt/homebrew/bin/swiftlint lint --config "${PROJECT_DIR}/.swiftlint.yml" --quiet
          elif [ -f "/usr/local/bin/swiftlint" ]; then
              /usr/local/bin/swiftlint lint --config "${PROJECT_DIR}/.swiftlint.yml" --quiet
          else
              echo "warning: SwiftLint not installed. Install with: brew install swiftlint"
          fi
        basedOnDependencyAnalysis: false
    preBuildScripts:
      - name: "Build Rust Core"
        script: |
          # Build Rust core library if needed
          CARGO_PATH="${HOME}/.cargo/bin/cargo"
          CORE_DIR="${PROJECT_DIR}/../../core"
          # Workspace target directory is at root level
          WORKSPACE_TARGET="${PROJECT_DIR}/../../target"

          if [ "${CONFIGURATION}" = "Debug" ]; then
              cd "${CORE_DIR}"
              "${CARGO_PATH}" build
              # Copy debug library from workspace target
              cp "${WORKSPACE_TARGET}/debug/libalephcore.dylib" "${PROJECT_DIR}/Aleph/Frameworks/"
              # Fix install_name to use @rpath for portability across machines
              install_name_tool -id "@rpath/libalephcore.dylib" "${PROJECT_DIR}/Aleph/Frameworks/libalephcore.dylib"
          else
              cd "${CORE_DIR}"
              "${CARGO_PATH}" build --release
              # Copy release library from workspace target
              cp "${WORKSPACE_TARGET}/release/libalephcore.dylib" "${PROJECT_DIR}/Aleph/Frameworks/"
              # Fix install_name to use @rpath for portability across machines
              install_name_tool -id "@rpath/libalephcore.dylib" "${PROJECT_DIR}/Aleph/Frameworks/libalephcore.dylib"
          fi
        basedOnDependencyAnalysis: false
      - name: "Generate UniFFI Bindings"
        script: |
          # Use pregenerated UniFFI bindings from core/bindings/
          # This avoids the need for uniffi-bindgen tool during build
          CORE_DIR="${PROJECT_DIR}/../../core"
          BINDINGS_SRC="${CORE_DIR}/bindings"
          BINDINGS_DEST="${PROJECT_DIR}/Aleph/Sources/Generated"

          # Create Generated directory if it doesn't exist
          mkdir -p "${BINDINGS_DEST}"

          # Copy pregenerated bindings
          cp "${BINDINGS_SRC}/aleph.swift" "${BINDINGS_DEST}/"
          cp "${BINDINGS_SRC}/alephFFI.h" "${BINDINGS_DEST}/"
          cp "${BINDINGS_SRC}/alephFFI.modulemap" "${BINDINGS_DEST}/"

          echo "UniFFI bindings copied from pregenerated files"
        basedOnDependencyAnalysis: false

  AlephTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: AlephTests
        name: AlephTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: Rootazero.AlephTests
        PRODUCT_NAME: $(TARGET_NAME)
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/Aleph.app/Contents/MacOS/Aleph
        SWIFT_EMIT_LOC_STRINGS: NO
    dependencies:
      - target: Aleph

  AlephUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: AlephUITests
        name: AlephUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: Rootazero.AlephUITests
        PRODUCT_NAME: $(TARGET_NAME)
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: Aleph
        SWIFT_EMIT_LOC_STRINGS: NO
    dependencies:
      - target: Aleph

schemes:
  Aleph:
    build:
      targets:
        Aleph: all
        AlephTests: [test]
        AlephUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - AlephTests
        - AlephUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
