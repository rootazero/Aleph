<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aether Canvas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
        }
        #canvas-root {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .welcome {
            text-align: center;
            padding: 2rem;
        }
        .welcome h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .welcome p {
            color: #888;
            max-width: 400px;
        }
        .status {
            position: fixed;
            bottom: 1rem;
            right: 1rem;
            padding: 0.5rem 1rem;
            background: rgba(0,0,0,0.5);
            border-radius: 4px;
            font-size: 0.75rem;
            color: #888;
        }
        .status.connected {
            color: #4ade80;
        }
    </style>
</head>
<body>
    <div id="canvas-root">
        <div class="welcome">
            <h1>Aether Canvas</h1>
            <p>Ready to receive content from the agent.</p>
        </div>
    </div>
    <div id="status" class="status">Initializing...</div>

    <!-- LIVE_RELOAD -->

    <script>
        // A2UI runtime will be loaded here
        window.A2UI = {
            surfaces: {},
            render: function(surfaceId, root) {
                console.log('A2UI render:', surfaceId, root);
            },
            update: function(surfaceId, components) {
                console.log('A2UI update:', surfaceId, components);
            },
            reset: function(surfaceId) {
                console.log('A2UI reset:', surfaceId);
            }
        };

        // Update status
        document.getElementById('status').textContent = 'Ready';
        document.getElementById('status').classList.add('connected');
    </script>
</body>
</html>
