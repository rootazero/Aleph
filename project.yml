name: Aether
options:
  bundleIdPrefix: Rootazero
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: false
  # Known regions for localization (XcodeGen will search for .lproj folders)
  knownRegions:
    - en
    - zh-Hans

settings:
  base:
    SWIFT_VERSION: 5.0
    MARKETING_VERSION: 0.1.0
    CURRENT_PROJECT_VERSION: 1
    MACOSX_DEPLOYMENT_TARGET: 15.0
    SDKROOT: macosx
    SUPPORTED_PLATFORMS: macosx
    ENABLE_PREVIEWS: YES
    SWIFT_APPROACHABLE_CONCURRENCY: YES
    SWIFT_EMIT_LOC_STRINGS: YES
    SWIFT_UPCOMING_FEATURE_MEMBER_IMPORT_VISIBILITY: YES
    STRING_CATALOG_GENERATE_SYMBOLS: YES
    # Limit to arm64 only to match Rust library architecture
    ARCHS: arm64
    ONLY_ACTIVE_ARCH: NO

targets:
  Aether:
    type: application
    platform: macOS
    sources:
      - path: Aether/Sources
        name: Sources
        type: group
      - path: Aether/Assets.xcassets
        type: file
      - path: Aether/Resources
        name: Resources
        type: group
        excludes:
          - "AppIcon/**"
    info:
      path: Aether/Info.plist
      properties:
        CFBundleDevelopmentRegion: en
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleInfoDictionaryVersion: "6.0"
        CFBundleName: $(PRODUCT_NAME)
        CFBundlePackageType: $(PRODUCT_BUNDLE_PACKAGE_TYPE)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleLocalizations:
          - en
          - zh-Hans
        LSMinimumSystemVersion: "15.0"
        LSUIElement: true
        NSAppleEventsUsageDescription: "Aether needs to simulate keyboard input to paste AI responses into your applications and monitor global hotkeys for seamless AI integration."
        NSHumanReadableCopyright: "Copyright © 2025 Aether. All rights reserved."
        NSPrincipalClass: NSApplication
    entitlements:
      path: Aether/Aether.entitlements
      properties:
        com.apple.security.automation.apple-events: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: Rootazero.Aether
        PRODUCT_NAME: $(TARGET_NAME)
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Aether/Info.plist
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
        OTHER_LDFLAGS:
          - -Xlinker
          - -no_application_extension
        LIBRARY_SEARCH_PATHS:
          - $(inherited)
          - $(PROJECT_DIR)/Aether/Frameworks
        FRAMEWORK_SEARCH_PATHS:
          - $(inherited)
          - $(PROJECT_DIR)/Aether/Frameworks
        HEADER_SEARCH_PATHS:
          - $(inherited)
          - $(PROJECT_DIR)/Aether/Sources/Generated
        SWIFT_INCLUDE_PATHS:
          - $(inherited)
          - $(PROJECT_DIR)/Aether/Sources/Generated
        # Enable module import for UniFFI FFI
        # Import bridging header for UniFFI (provides access to aetherFFI.h)
        SWIFT_OBJC_BRIDGING_HEADER: $(PROJECT_DIR)/Aether/Sources/AetherBridgingHeader.h
        CLANG_ENABLE_MODULES: YES
    dependencies:
      - framework: Aether/Frameworks/libaethecore.dylib
        embed: true
        link: true
    preBuildScripts:
      - name: "Build Rust Core"
        script: |
          # Build Rust core library if needed
          CARGO_PATH="${HOME}/.cargo/bin/cargo"

          if [ "${CONFIGURATION}" = "Debug" ]; then
              cd "${PROJECT_DIR}/Aether/core"
              "${CARGO_PATH}" build
              # Copy debug library
              cp target/debug/libaethecore.dylib "${PROJECT_DIR}/Aether/Frameworks/"
              # Fix install_name to use @rpath for portability across machines
              install_name_tool -id "@rpath/libaethecore.dylib" "${PROJECT_DIR}/Aether/Frameworks/libaethecore.dylib"
          else
              cd "${PROJECT_DIR}/Aether/core"
              "${CARGO_PATH}" build --release
              # Copy release library
              cp target/release/libaethecore.dylib "${PROJECT_DIR}/Aether/Frameworks/"
              # Fix install_name to use @rpath for portability across machines
              install_name_tool -id "@rpath/libaethecore.dylib" "${PROJECT_DIR}/Aether/Frameworks/libaethecore.dylib"
          fi
        basedOnDependencyAnalysis: false
      - name: "Generate UniFFI Bindings"
        script: |
          # Generate Swift bindings from Rust using Cargo uniffi-bindgen
          CARGO_PATH="${HOME}/.cargo/bin/cargo"
          cd "${PROJECT_DIR}/Aether/core"

          # Determine which library to use based on configuration
          if [ "${CONFIGURATION}" = "Debug" ]; then
              LIBRARY_PATH="target/debug/libaethecore.dylib"
          else
              LIBRARY_PATH="target/release/libaethecore.dylib"
          fi

          # Use Cargo to run uniffi-bindgen (more reliable than Python version)
          "${CARGO_PATH}" run --bin uniffi-bindgen -- generate \
            --library "${LIBRARY_PATH}" \
            --language swift \
            --out-dir "${PROJECT_DIR}/Aether/Sources/Generated/"

          echo "UniFFI bindings generated successfully"
        basedOnDependencyAnalysis: false

  AetherTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: AetherTests
        name: AetherTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: Rootazero.AetherTests
        PRODUCT_NAME: $(TARGET_NAME)
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/Aether.app/Contents/MacOS/Aether
        SWIFT_EMIT_LOC_STRINGS: NO
    dependencies:
      - target: Aether

  AetherUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: AetherUITests
        name: AetherUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: Rootazero.AetherUITests
        PRODUCT_NAME: $(TARGET_NAME)
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: Aether
        SWIFT_EMIT_LOC_STRINGS: NO
    dependencies:
      - target: Aether

schemes:
  Aether:
    build:
      targets:
        Aether: all
        AetherTests: [test]
        AetherUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - AetherTests
        - AetherUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
