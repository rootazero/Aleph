name: Server Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-22.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: core

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler \
            libxcb1-dev libxcb-randr0-dev libxcb-shm0-dev libxcb-xfixes0-dev \
            libxcb-shape0-dev libxcb-xtest0-dev libxkbcommon-dev libxss-dev libx11-dev

      - name: Run tests
        run: cargo test -p alephcore --lib

  build:
    name: Build (${{ matrix.target }})
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            features: control-plane,desktop
            asset: aleph-server-darwin-aarch64
          - os: macos-13
            target: x86_64-apple-darwin
            features: control-plane,desktop
            asset: aleph-server-darwin-x86_64
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            features: control-plane,desktop
            asset: aleph-server-linux-x86_64
          - os: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            features: control-plane
            asset: aleph-server-linux-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            features: control-plane
            asset: aleph-server-windows-x86_64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }},wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: core

      - name: Install protoc (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install protoc (macOS)
        if: startsWith(matrix.os, 'macos')
        run: brew install protobuf

      - name: Install protoc (Windows)
        if: matrix.os == 'windows-latest'
        run: choco install protoc -y

      # ── WASM Panel UI build ──

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: npm install
        working-directory: core/ui/control_plane

      - name: Build Tailwind CSS
        run: npm run build:css
        working-directory: core/ui/control_plane

      - name: Compile Rust to WASM
        run: cargo build -p aleph-control-plane --target wasm32-unknown-unknown --release

      - name: Install wasm-bindgen-cli
        run: cargo install wasm-bindgen-cli --version 0.2.108

      - name: Generate JS bindings
        shell: bash
        run: |
          wasm-bindgen --target web --no-typescript \
            --out-dir core/ui/control_plane/dist --out-name aleph_dashboard \
            target/wasm32-unknown-unknown/release/aleph_dashboard.wasm

      - name: Generate index.html
        shell: bash
        run: |
          cat > core/ui/control_plane/dist/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html lang="en">
            <head>
              <meta charset="utf-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1" />
              <title>Aleph Dashboard</title>
              <link rel="stylesheet" href="/tailwind.css" />
            </head>
            <body class="bg-surface text-text-primary">
              <noscript>This application requires JavaScript to run.</noscript>
              <script type="module">
                import init from '/aleph_dashboard.js';
                await init('/aleph_dashboard_bg.wasm');
              </script>
            </body>
          </html>
          HTMLEOF

      # ── Linux build dependencies ──

      - name: Install Linux system libraries
        if: matrix.os == 'ubuntu-22.04' && matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb1-dev libxcb-randr0-dev libxcb-shm0-dev libxcb-xfixes0-dev \
            libxcb-shape0-dev libxcb-xtest0-dev libxkbcommon-dev libxss-dev libx11-dev \
            libssl-dev libwayland-dev libgtk-3-dev libsoup-3.0-dev libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo dpkg --add-architecture arm64
          sudo sed -i 's/^deb /deb [arch=amd64] /' /etc/apt/sources.list
          echo 'deb [arch=arm64] http://ports.ubuntu.com/ jammy main restricted universe multiverse' | sudo tee /etc/apt/sources.list.d/arm64.list
          echo 'deb [arch=arm64] http://ports.ubuntu.com/ jammy-updates main restricted universe multiverse' | sudo tee -a /etc/apt/sources.list.d/arm64.list
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu libssl-dev:arm64
          echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml

      # ── Server build ──

      - name: Set cross-compile env (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          echo "PKG_CONFIG_SYSROOT_DIR=/usr/aarch64-linux-gnu" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> "$GITHUB_ENV"

      - name: Build server
        run: cargo build --bin aleph-server --features ${{ matrix.features }} --release --target ${{ matrix.target }}

      - name: Rename artifact
        shell: bash
        run: |
          SRC="target/${{ matrix.target }}/release/aleph-server"
          if [ "${{ matrix.os }}" = "windows-latest" ]; then SRC="${SRC}.exe"; fi
          cp "$SRC" "${{ matrix.asset }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            aleph-server-darwin-aarch64/aleph-server-darwin-aarch64
            aleph-server-darwin-x86_64/aleph-server-darwin-x86_64
            aleph-server-linux-x86_64/aleph-server-linux-x86_64
            aleph-server-linux-aarch64/aleph-server-linux-aarch64
            aleph-server-windows-x86_64.exe/aleph-server-windows-x86_64.exe
