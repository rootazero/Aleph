name: Server Release

# Manual trigger only — build from a tested, stable commit.
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v0.2.0)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.asset }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: aleph-darwin-aarch64
          - os: macos-latest
            target: x86_64-apple-darwin
            asset: aleph-darwin-x86_64
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            asset: aleph-linux-x86_64
          - os: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            asset: aleph-linux-aarch64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install protoc (macOS)
        if: startsWith(matrix.os, 'macos')
        run: brew install protobuf

      - name: Install protoc (Linux)
        if: startsWith(matrix.os, 'ubuntu')
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install Linux system libraries
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get install -y \
            libxcb1-dev libxcb-randr0-dev libxcb-shm0-dev libxcb-xfixes0-dev \
            libxcb-shape0-dev libxcb-xtest0-dev libxkbcommon-dev libxss-dev libx11-dev \
            libssl-dev libwayland-dev libpipewire-0.3-dev libdbus-1-dev \
            libdrm-dev libgbm-dev clang libclang-dev

      # Panel WASM dist is pre-built and committed to git — no WASM build needed.
      - name: Build server
        run: cargo build --bin aleph --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          cp "target/${{ matrix.target }}/release/aleph" aleph
          tar -czf "${{ matrix.asset }}.tar.gz" aleph

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}.tar.gz

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Tag release
        run: |
          git tag "${{ inputs.version }}" || true
          git push origin "${{ inputs.version }}" || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: Aleph ${{ inputs.version }}
          body: |
            ## Install

            ```bash
            curl -fsSL https://raw.githubusercontent.com/rootazero/Aleph/main/install.sh | bash
            ```

            Or specify version:
            ```bash
            curl -fsSL https://raw.githubusercontent.com/rootazero/Aleph/main/install.sh | bash -s -- ${{ inputs.version }}
            ```
          files: |
            artifacts/**/*.tar.gz
