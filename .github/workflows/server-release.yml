name: Server Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: aleph-server-darwin-aarch64
          - os: macos-latest
            target: x86_64-apple-darwin
            asset: aleph-server-darwin-x86_64
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            asset: aleph-server-linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: aleph-server-windows-x86_64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: core

      - name: Build server
        run: cargo build --bin aleph-server --features control-plane --release --target ${{ matrix.target }}

      - name: Rename artifact
        shell: bash
        run: |
          SRC="target/${{ matrix.target }}/release/aleph-server"
          if [ "${{ matrix.os }}" = "windows-latest" ]; then SRC="${SRC}.exe"; fi
          cp "$SRC" "${{ matrix.asset }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            aleph-server-darwin-aarch64/aleph-server-darwin-aarch64
            aleph-server-darwin-x86_64/aleph-server-darwin-x86_64
            aleph-server-linux-x86_64/aleph-server-linux-x86_64
            aleph-server-windows-x86_64.exe/aleph-server-windows-x86_64.exe
