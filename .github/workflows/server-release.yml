name: Server Release

# Manual trigger only — build from a tested, stable commit.
# Version is read from the VERSION file in the repo root.
on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.asset }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: aleph-darwin-aarch64
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            asset: aleph-linux-x86_64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            asset: aleph-linux-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: aleph-windows-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Read version from VERSION file
        id: version
        shell: bash
        run: echo "value=v$(cat VERSION | tr -d '[:space:]')" >> $GITHUB_OUTPUT

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install protoc (macOS)
        if: startsWith(matrix.os, 'macos')
        run: brew install protobuf

      - name: Install protoc (Linux)
        if: startsWith(matrix.os, 'ubuntu')
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install protoc (Windows)
        if: startsWith(matrix.os, 'windows')
        run: choco install protoc -y

      - name: Install Linux system libraries
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get install -y \
            libxcb1-dev libxcb-randr0-dev libxcb-shm0-dev libxcb-xfixes0-dev \
            libxcb-shape0-dev libxcb-xtest0-dev libxkbcommon-dev libxss-dev \
            libx11-dev libxrandr-dev libxi-dev libxtst-dev \
            libssl-dev libwayland-dev libpipewire-0.3-dev libdbus-1-dev \
            libdrm-dev libgbm-dev libegl-dev libxdo-dev clang libclang-dev

      # Panel WASM dist is pre-built and committed to git — no WASM build needed.
      - name: Build server
        run: cargo build --bin aleph --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: "!startsWith(matrix.os, 'windows')"
        shell: bash
        run: |
          cp "target/${{ matrix.target }}/release/aleph" aleph
          tar -czf "${{ matrix.asset }}.tar.gz" aleph

      - name: Package (Windows)
        if: startsWith(matrix.os, 'windows')
        shell: pwsh
        run: |
          Copy-Item "target/${{ matrix.target }}/release/aleph.exe" aleph.exe
          Compress-Archive -Path aleph.exe -DestinationPath "${{ matrix.asset }}.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: |
            ${{ matrix.asset }}.tar.gz
            ${{ matrix.asset }}.zip

    outputs:
      version: ${{ steps.version.outputs.value }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Read version from VERSION file
        id: version
        run: echo "value=v$(cat VERSION | tr -d '[:space:]')" >> $GITHUB_OUTPUT

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Tag release
        run: |
          git tag "${{ steps.version.outputs.value }}" || true
          git push origin "${{ steps.version.outputs.value }}" || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.value }}
          name: Aleph ${{ steps.version.outputs.value }}
          body: |
            ## Install

            **macOS / Linux:**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/rootazero/Aleph/main/install.sh | bash
            ```

            Or specify version:
            ```bash
            curl -fsSL https://raw.githubusercontent.com/rootazero/Aleph/main/install.sh | bash -s -- ${{ steps.version.outputs.value }}
            ```

            **Windows (PowerShell):**
            ```powershell
            irm https://raw.githubusercontent.com/rootazero/Aleph/main/install.ps1 | iex
            ```

            Or specify version:
            ```powershell
            $env:ALEPH_VERSION="${{ steps.version.outputs.value }}"; irm https://raw.githubusercontent.com/rootazero/Aleph/main/install.ps1 | iex
            ```
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
