name: Tauri Release

# Version is read from the VERSION file in the repo root.
on:
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create_release.outputs.id }}
      version: ${{ steps.version.outputs.value }}
    steps:
      - uses: actions/checkout@v4

      - name: Read version from VERSION file
        id: version
        run: echo "value=$(cat VERSION | tr -d '[:space:]')" >> $GITHUB_OUTPUT

      - name: Tag release
        run: |
          git tag "v${{ steps.version.outputs.value }}" || true
          git push origin "v${{ steps.version.outputs.value }}" || true

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.value }}
          name: Aleph v${{ steps.version.outputs.value }}
          draft: true
          prerelease: false
          generate_release_notes: true

  build-tauri:
    name: Build (${{ matrix.platform }})
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'ubuntu-22.04'
            args: ''
            rust_targets: ''
            server_target: 'x86_64-unknown-linux-gnu'
          - platform: 'windows-latest'
            args: ''
            rust_targets: ''
            server_target: 'x86_64-pc-windows-msvc'

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            core
            apps/desktop/src-tauri

      # Linux dependencies
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: Build aleph
        run: |
          cargo build --bin aleph --features control-plane --release --target ${{ matrix.server_target }}

      - name: Copy aleph into Tauri resources
        shell: bash
        run: |
          mkdir -p apps/desktop/src-tauri/binaries
          SRC="target/${{ matrix.server_target }}/release/aleph"
          if [ "${{ matrix.platform }}" = "windows-latest" ]; then SRC="${SRC}.exe"; fi
          cp "$SRC" "apps/desktop/src-tauri/binaries/"

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Update version in Cargo.toml
        shell: bash
        run: |
          VERSION="${{ needs.create-release.outputs.version }}"
          if [ -n "$VERSION" ]; then
            sed -i.bak "s/^version = .*/version = \"$VERSION\"/" apps/desktop/src-tauri/Cargo.toml
            rm -f apps/desktop/src-tauri/Cargo.toml.bak
          fi

      - name: Update version in tauri.conf.json
        shell: bash
        run: |
          VERSION="${{ needs.create-release.outputs.version }}"
          if [ -n "$VERSION" ]; then
            sed -i.bak "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" apps/desktop/src-tauri/tauri.conf.json
            rm -f apps/desktop/src-tauri/tauri.conf.json.bak
          fi

      - name: Build Tauri app
        working-directory: apps/desktop/src-tauri
        run: cargo tauri build ${{ matrix.args }}

      - name: Upload artifacts (Windows)
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: Aleph-Windows
          path: |
            apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
            apps/desktop/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn

      - name: Upload artifacts (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: Aleph-Linux
          path: |
            apps/desktop/src-tauri/target/release/bundle/deb/*.deb
            apps/desktop/src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: warn

  publish-release:
    name: Publish Release
    needs: [create-release, build-tauri]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.create-release.outputs.version }}
          draft: false
          files: |
            Aleph-Windows/**/*.exe
            Aleph-Windows/**/*.msi
            Aleph-Linux/**/*.deb
            Aleph-Linux/**/*.AppImage
