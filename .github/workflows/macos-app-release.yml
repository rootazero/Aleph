name: macOS App Release

# Version is read from the VERSION file in the repo root.
on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build macOS App
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version from VERSION file
        id: version
        run: echo "value=v$(cat VERSION | tr -d '[:space:]')" >> $GITHUB_OUTPUT

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: core

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Build universal server binary
        run: |
          cargo build --bin aleph --features control-plane --release --target aarch64-apple-darwin
          cargo build --bin aleph --features control-plane --release --target x86_64-apple-darwin
          mkdir -p apps/macos-native/Aleph/Resources
          lipo -create \
            target/aarch64-apple-darwin/release/aleph \
            target/x86_64-apple-darwin/release/aleph \
            -output apps/macos-native/Aleph/Resources/aleph

      - name: Generate Xcode project
        run: cd apps/macos-native && xcodegen generate

      - name: Build Aleph.app
        run: |
          cd apps/macos-native
          xcodebuild -project Aleph.xcodeproj -scheme Aleph -configuration Release \
            -derivedDataPath build clean build

      - name: Create DMG
        run: |
          APP="apps/macos-native/build/Build/Products/Release/Aleph.app"
          hdiutil create -volname "Aleph" -srcfolder "$APP" -ov -format UDZO Aleph.dmg

      - uses: actions/upload-artifact@v4
        with:
          name: Aleph.dmg
          path: Aleph.dmg

    outputs:
      version: ${{ steps.version.outputs.value }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Read version from VERSION file
        id: version
        run: echo "value=v$(cat VERSION | tr -d '[:space:]')" >> $GITHUB_OUTPUT

      - uses: actions/download-artifact@v4

      - name: Tag release
        run: |
          git tag "${{ steps.version.outputs.value }}" || true
          git push origin "${{ steps.version.outputs.value }}" || true

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.value }}
          name: Aleph macOS ${{ steps.version.outputs.value }}
          files: Aleph.dmg/Aleph.dmg
