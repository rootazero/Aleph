name: Tauri App

on:
  push:
    paths:
      - 'apps/desktop/**'
      - 'core/**'
      - '.github/workflows/tauri-app.yml'
  pull_request:
    paths:
      - 'apps/desktop/**'
      - 'core/**'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-tauri:
    name: Build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'ubuntu-22.04'
            args: ''
            rust_targets: ''
            server_target: 'x86_64-unknown-linux-gnu'
          - platform: 'windows-latest'
            args: ''
            rust_targets: ''
            server_target: 'x86_64-pc-windows-msvc'

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            core
            apps/desktop/src-tauri

      # Linux dependencies
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: Build aleph
        run: |
          cargo build --bin aleph --features control-plane --release --target ${{ matrix.server_target }}

      - name: Copy aleph into Tauri resources
        shell: bash
        run: |
          mkdir -p apps/desktop/src-tauri/binaries
          SRC="target/${{ matrix.server_target }}/release/aleph"
          if [ "${{ matrix.platform }}" = "windows-latest" ]; then SRC="${SRC}.exe"; fi
          cp "$SRC" "apps/desktop/src-tauri/binaries/"

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build Tauri app
        working-directory: apps/desktop/src-tauri
        run: cargo tauri build ${{ matrix.args }}

      - name: Upload artifacts (Windows)
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: Aleph-Windows
          path: |
            apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
            apps/desktop/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn

      - name: Upload artifacts (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: Aleph-Linux
          path: |
            apps/desktop/src-tauri/target/release/bundle/deb/*.deb
            apps/desktop/src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: warn
