name: Rust Core

on:
  push:
    paths:
      - 'core/**'
      - 'Cargo.toml'
      - '.github/workflows/rust-core.yml'
  pull_request:
    paths:
      - 'core/**'
      - 'Cargo.toml'

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: core
      - name: Run tests
        run: cargo test --workspace
        env:
          PROPTEST_CASES: 1024

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: core
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

  loom-tests:
    name: Loom Concurrency
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: core
      - name: Run loom tests
        run: cargo test --features loom --lib
        env:
          RUSTFLAGS: "--cfg loom"
          LOOM_MAX_PREEMPTIONS: 3
        timeout-minutes: 30

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: core
      - name: Build with UniFFI
        run: cargo build --release --features uniffi
        working-directory: core
      - uses: actions/upload-artifact@v4
        with:
          name: libalephcore-macos
          path: core/target/release/libalephcore.dylib

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: core
      - name: Build with C ABI
        run: cargo build --release --features cabi
        working-directory: core
      - uses: actions/upload-artifact@v4
        with:
          name: alephcore-windows
          path: core/target/release/alephcore.dll
